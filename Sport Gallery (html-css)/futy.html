<!DOCTYPE html>
<html>
    <head>
      <title>website</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    </head>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-image: url("backgrounds/futyback.jpg");
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            margin: 0;
            
            color:#333;
        }
        .navigation{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color:#0f172a;
            border: none;
            border-radius: 0.5rem;
            background-image: url("s.jpg");
            padding: 2rem;
            
        }
        .navigation span{
            font-size: 3rem;
            color:teal;
            text-shadow: 0 0 4px #fff, 
                 0 0 10px #fff, 
                 0 0 20px teal, 
                 0 0 30px teal;;
            font-style: italic;
            font-weight: bold;
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
        .links{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            gap: 2.5rem;
            
        }
        .navigation a{
            text-decoration: none;
            font-size: 1.4rem;
            background-color:#0ea5e9;
            color:white;
            border: none;
            border-radius: 0.5rem;
            line-height: 1rem;
            padding: 0.6rem 1.4rem;
        }
        .c-container{
            max-width: 1000px;
            margin: 0 1rem ;
            padding: 0 10px;
        }
        .catagory{
            display:flex;
            justify-content: left;
            align-items: center;
            margin: 1rem 2rem;
            gap:1rem;
            text-decoration: none;
        }
        .catagory a{
            font-size: 1.2rem;
            color: white;
            border: none;
            border-radius: 0.2rem;
            background-color:#333;
            padding:0.5rem;
        }
        .boxes{
            display: grid;
            justify-content: center;
            align-items: center;
            margin: 1rem;
            gap:1rem;
            grid-template-columns: repeat(3, minmax(250px, 1fr));
        }
        .box{
            
            border: none;
            height: 400px;
            border-radius: 0.4rem;
            background-color: #0f172a;
            overflow: hidden;
            cursor:pointer;
            
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;  
        }
        img:hover{
            transform: scale(1.1);
            transition:0.4s;
        }
    </style>
    <body>
        <header>
            <nav class="navigation">
                <span>Sport Gallery</span>
                <div class="links">
               
                    <a href="index.html">Home</a>
                    <a href="about.html">About Us</a>
                
                </div>
            </nav>
        </header>
        <div class="c-container">
            <nav class="catagory">
                <a href="futy.html">Football</a>
                <a href="car.html">Cars</a>
                <a href="boxing.html">Boxing</a>
            </nav>
        </div>
        <main>
            <div class="boxes">
                <div class="box"><img src="image/m.jpg"></div>
                <div class="box"><img src="image/r.jpg"></div>
                <div class="box"><img src="image/barca-duo.jpg"></div>
                
                <div class="box"><img src="image/dembele.jpg"></div>
                <div class="box"><img src="image/ronaldo4.jpg"></div>
                <div class="box"><img src="image/Messi2.jpg"></div>
                <div class="box"><img src="image/olise.jpg"></div>
                <div class="box"><img src="image/km.jpg"></div>
                <div class="box"><img src="image/mes.jpg"></div>
            </div>
        </main>
    </body>
</html>
